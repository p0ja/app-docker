services:
  web:
    image: nginx:1.28-alpine
    ports:
      - "${WEB_PORT:-8888}:80"
    volumes:
      - ./docker/conf.d/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./app:/app
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/conf.d
      APP_DOCUMENT_ROOT: ${APP_DOCUMENT_ROOT:-/app/public}
      SERVER_NAME: ${SERVER_NAME:-localhost}
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - appnamenet

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        INSTALL_XDEBUG: ${INSTALL_XDEBUG:-false}
        INSTALL_IMAGICK: ${INSTALL_IMAGICK:-false}
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_NAME: ${DB_NAME:-appname}
      DB_USER: ${DB_USER:-user}
      DB_PASS: ${DB_PASS:-password}
      DB_DRIVER: ${DB_DRIVER:-mysql}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
    restart: unless-stopped
    volumes:
      - ./app:/app
    networks:
      - appnamenet

  mysql:
    image: mariadb:11.4
    profiles: ["db"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appname}
    volumes:
      - ./docker/db/config:/etc/mysql/conf.d:ro
      - ./docker/db:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3325}:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - appnamenet

  postgres:
    image: postgres:17-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appname}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - appnamenet

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - appnamenet

  adminer:
    image: adminer:4
    profiles: ["tools"]
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - appnamenet

  mailpit:
    image: axllent/mailpit:v1.21
    profiles: ["mail", "tools"]
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    restart: unless-stopped
    networks:
      - appnamenet

volumes:
  mysql_data:
  postgres_data:

networks:
  appnamenet:
